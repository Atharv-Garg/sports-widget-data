name: SportsWidget
options:
  bundleIdPrefix: com.atharvgarg.sportswidget
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9F26X2KPN4
targets:
  SportsWidget:
    type: application
    platform: macOS
    sources: [App, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgarg.sportswidget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sports Widget
        INFOPLIST_KEY_LSUIElement: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/SportsWidget.entitlements
    dependencies:
      - target: SportsWidgetExtension
        embed: true
  SportsWidgetExtension:
    type: app-extension
    platform: macOS
    sources: [Widget, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgarg.sportswidget.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Widget/SportsWidgetExtension.entitlements
