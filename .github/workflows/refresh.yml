name: Refresh feed

on:
  schedule:
    # Run twice an hour at :17 and :47. GitHub's docs explicitly recommend
    # avoiding the top of the hour because high-load periods can skip those
    # firings entirely. Two firings per hour means even if one is skipped,
    # the next attempt is ~30 minutes away instead of 60.
    - cron: "17,47 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Build feed
        run: python scrapers/build.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "refresh feed.json"
            git push
          fi
